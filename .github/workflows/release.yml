name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            asset: office-print-linux-x86_64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            asset: office-print-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            asset: office-print-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            asset: office-print-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p office-print-cli --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir pkg
          cp target/${{ matrix.target }}/release/office-print${{ matrix.ext }} pkg/
          cp contrib/python/office_print.py pkg/
          7z a ${{ matrix.asset }} ./pkg/*

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir pkg
          cp target/${{ matrix.target }}/release/office-print${{ matrix.ext }} pkg/
          cp contrib/python/office_print.py pkg/ 2>/dev/null || true
          tar czf ${{ matrix.asset }} -C pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: List assets
        run: ls -lh assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: assets/*
          generate_release_notes: true
